version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: sureflow-postgres
    environment:
      POSTGRES_USER: sureflow_user
      POSTGRES_PASSWORD: sureflow_password
      POSTGRES_DB: sureflow_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sureflow_user -d sureflow_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    container_name: sureflow-chromadb
    environment:
      - IS_PERSISTENT=TRUE
      - ALLOW_RESET=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped

volumes:
  postgres_data:
  chroma_data:
