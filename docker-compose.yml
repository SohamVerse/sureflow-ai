services:
  db:
    image: pgvector/pgvector:pg15
    container_name: sureflow-postgres
    environment:
      POSTGRES_USER: sureflow_user
      POSTGRES_PASSWORD: sureflow_password
      POSTGRES_DB: sureflow_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sureflow_user -d sureflow_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  temporal:
    image: temporalio/auto-setup:latest
    container_name: sureflow-temporal
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: sureflow_user
      POSTGRES_PWD: sureflow_password
      POSTGRES_SEEDS: db
    ports:
      - "7233:7233"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  temporal-ui:
    image: temporalio/ui:latest
    container_name: sureflow-temporal-ui
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: "http://localhost:3000"
    ports:
      - "8080:8080"
    depends_on:
      - temporal
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: sureflow-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "4317:4317"   # OTLP gRPC — backend sends traces here
      - "4318:4318"   # OTLP HTTP
      - "16686:16686" # Jaeger Web UI
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: sureflow-prometheus
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: sureflow-grafana
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
    ports:
      - "3001:3000"   # 3000 is taken by the Next.js frontend
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - jaeger
    restart: unless-stopped

volumes:
  postgres_data:
  grafana_data:
