services:
  db:
    image: pgvector/pgvector:pg15
    container_name: sureflow-postgres
    environment:
      POSTGRES_USER: sureflow_user
      POSTGRES_PASSWORD: sureflow_password
      POSTGRES_DB: sureflow_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sureflow_user -d sureflow_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  temporal:
    image: temporalio/auto-setup:latest
    container_name: sureflow-temporal
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: sureflow_user
      POSTGRES_PWD: sureflow_password
      POSTGRES_SEEDS: db
    ports:
      - "7233:7233"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  temporal-ui:
    image: temporalio/ui:latest
    container_name: sureflow-temporal-ui
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: "http://localhost:3000"
    ports:
      - "8085:8080"
    depends_on:
      - temporal
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: sureflow-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "4317:4317"   # OTLP gRPC — backend sends traces here
      - "4318:4318"   # OTLP HTTP
      - "16686:16686" # Jaeger Web UI
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: sureflow-prometheus
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: sureflow-grafana
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
    ports:
      - "3001:3000"   # 3000 is taken by the Next.js frontend
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - jaeger
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    container_name: sureflow-neo4j
    environment:
      NEO4J_AUTH: neo4j/sureflow_password
    ports:
      - "7687:7687" # Bolt — Python driver connects here
      - "7474:7474" # Neo4j Browser UI
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: sureflow-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://sureflow_user:sureflow_password@db:5432/sureflow_db
      - NEO4J_URI=bolt://neo4j:7687
      - TEMPORAL_ADDRESS=temporal:7233
      - OTLP_ENDPOINT=jaeger:4317
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
    depends_on:
      db:
        condition: service_healthy
      neo4j:
        condition: service_started
      temporal:
        condition: service_started
      jaeger:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  temporal-worker:
    build: ./backend
    container_name: sureflow-temporal-worker
    command: python workflows/worker.py
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://sureflow_user:sureflow_password@db:5432/sureflow_db
      - NEO4J_URI=bolt://neo4j:7687
      - TEMPORAL_ADDRESS=temporal:7233
      - OTLP_ENDPOINT=jaeger:4317
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
    depends_on:
      - backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: sureflow-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  grafana_data:
  neo4j_data:
