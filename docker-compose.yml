services:
  db:
    image: pgvector/pgvector:pg15
    container_name: sureflow-postgres
    environment:
      POSTGRES_USER: sureflow_user
      POSTGRES_PASSWORD: sureflow_password
      POSTGRES_DB: sureflow_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sureflow_user -d sureflow_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  temporal:
    image: temporalio/auto-setup:latest
    container_name: sureflow-temporal
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: sureflow_user
      POSTGRES_PWD: sureflow_password
      POSTGRES_SEEDS: db
    ports:
      - "7233:7233"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  temporal-ui:
    image: temporalio/ui:latest
    container_name: sureflow-temporal-ui
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: "http://localhost:3000"
    ports:
      - "8080:8080"
    depends_on:
      - temporal
    restart: unless-stopped

volumes:
  postgres_data:
