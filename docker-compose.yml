services:
  db:
    image: pgvector/pgvector:pg15
    container_name: sureflow-postgres
    environment:
      POSTGRES_USER: sureflow_user
      POSTGRES_PASSWORD: sureflow_password
      POSTGRES_DB: sureflow_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sureflow_user -d sureflow_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
