services:
  - type: web
    name: sureflow-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    healthCheckPath: /
    envVars:
      # -- PostgreSQL (NeonDB — set manually in dashboard) ---------------------
      - key: DATABASE_URL
        sync: false

      # -- Neo4j AuraDB --------------------------------------------------------
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USER
        value: neo4j
      - key: NEO4J_PASSWORD
        sync: false

      # -- Gemini --------------------------------------------------------------
      - key: GEMINI_API_KEY
        sync: false

      # -- Auth ----------------------------------------------------------------
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_MINUTES
        value: "1440"

      # -- CORS (update after deploying frontend) ----------------------------
      # Example: '["https://your-app.vercel.app","http://localhost:3000"]'
      - key: CORS_ORIGINS
        sync: false

      # -- Ollama disabled (no GPU on Render) --------------------------------
      - key: OLLAMA_BASE_URL
        value: http://localhost:11434

      # -- App --------------------------------------------------------------
      - key: DEBUG
        value: "false"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHONPATH
        value: /app
